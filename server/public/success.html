<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Оплата прошла успешно — PlataPay</title>
<style>
  :root{color-scheme:dark;}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;background:#08172F;color:#eef3ff;}
  .wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px 24px;}
  .icon{font-size:72px;line-height:1;margin-bottom:20px;}
  .tag{font-size:12px;letter-spacing:.12em;color:#22C55E;text-transform:uppercase;font-weight:600;margin-bottom:12px;}
  h1{font-size:36px;margin:0 0 12px;font-weight:700;letter-spacing:-.02em;}
  p{color:#9fb2d4;max-width:460px;margin:0 0 32px;line-height:1.6;font-size:16px;}
  .order-box{background:#0c1f40;border:1px solid #1d3a6b;border-radius:14px;padding:18px 24px;margin-bottom:32px;max-width:420px;width:100%;text-align:left;display:none;}
  .order-box .row{display:flex;justify-content:space-between;gap:12px;margin-bottom:8px;font-size:14px;}
  .order-box .row:last-child{margin-bottom:0;}
  .order-box .lbl{color:#9fb2d4;}
  .order-box .val{color:#eef3ff;font-weight:600;text-align:right;}
  .status-paid{color:#22C55E;}
  .btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
  a.btn{display:inline-flex;align-items:center;padding:13px 24px;border-radius:12px;font-size:15px;font-weight:700;text-decoration:none;transition:filter .2s;}
  a.btn:hover{filter:brightness(1.1);}
  .primary{background:linear-gradient(180deg,#2e7bff,#1e5fd6);color:#fff;}
  .ghost{background:#0c1f40;color:#eef3ff;border:1px solid #1d3a6b;}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">✅</div>
  <div class="tag">Оплата прошла</div>
  <h1>Спасибо за оплату!</h1>
  <p>Ваш платёж успешно получен. Мы уже приступаем к выполнению вашего заказа. Ожидайте сообщения по указанному контакту.</p>

  <div class="order-box" id="order-info">
    <div class="row"><span class="lbl">Сервис</span><span class="val" id="ord-service">—</span></div>
    <div class="row"><span class="lbl">Сумма</span><span class="val" id="ord-amount">—</span></div>
    <div class="row"><span class="lbl">Статус</span><span class="val status-paid">✓ Оплачено</span></div>
    <div class="row"><span class="lbl">Заказ №</span><span class="val" id="ord-id" style="font-size:12px;font-family:monospace">—</span></div>
  </div>

  <div class="btns">
    <a class="btn primary" href="/">На главную</a>
    <a class="btn ghost" href="https://t.me/Kimzar_A" target="_blank" rel="noopener">Написать в Telegram</a>
  </div>
</div>
<script>
(function(){
  // Order details are passed as URL params by create-invoice to avoid
  // needing a stateful database (serverless environment).
  var p = new URLSearchParams(location.search);
  var service  = p.get('service');
  var amount   = p.get('amount');
  var orderId  = p.get('order_id');

  if (!service && !orderId) return;

  if (service)  document.getElementById('ord-service').textContent = service;
  if (amount)   document.getElementById('ord-amount').textContent  = Number(amount).toLocaleString('ru-RU') + ' ₽';
  if (orderId)  document.getElementById('ord-id').textContent      = orderId;

  document.getElementById('order-info').style.display = 'block';
})();
</script>
</body>
</html>
