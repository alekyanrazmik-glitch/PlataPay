# Render Blueprint — авто-конфигурация веб-сервиса из Dockerfile.
# Render прочитает этот файл при подключении репозитория и сам создаст
# сервис. Вам останется только заполнить значения секретов (sync: false).
# Документация: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: platapay
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # Секреты — Render запросит значения при создании (в код не попадают).
      - key: ENOT_API_KEY
        sync: false
      - key: ENOT_SECRET_KEY
        sync: false
      - key: ENOT_SHOP_ID
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      # SERVER_URL и WEBHOOK_URL задайте после первого деплоя,
      # когда Render выдаст публичный домен.
      - key: SERVER_URL
        sync: false
      - key: WEBHOOK_URL
        sync: false
