services:
  platapay:
    build: .
    container_name: platapay
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Secrets are read from the .env file (never committed to git).
      - ENOT_API_KEY=${ENOT_API_KEY}
      - ENOT_SECRET_KEY=${ENOT_SECRET_KEY}
      - ENOT_SHOP_ID=${ENOT_SHOP_ID}
      - SERVER_URL=${SERVER_URL}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
